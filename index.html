<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量图片去水印工具</title>
    <script src="libs/jszip.min.js"></script>
    <style>
        /* ==================== CSS样式模块 ==================== */
        
        /* 基础变量定义 */
        :root {
            --primary-color: #00d4ff;
            --secondary-color: #0099cc;
            --bg-dark: #0a0e17;
            --bg-card: #111827;
            --bg-hover: #1f2937;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --border-color: #374151;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --danger-color: #ef4444;
            --success-color: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景动画效果 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 80%, rgba(0, 212, 255, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(0, 153, 204, 0.03) 0%, transparent 50%);
            animation: bgRotate 30s linear infinite;
        }

        @keyframes bgRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 主容器 */
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部样式 */
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* 主布局 */
        .main-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }

        /* 侧边栏样式 */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .panel-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: var(--primary-color);
            border-radius: 2px;
        }

        /* 上传区域样式 */
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 212, 255, 0.02);
        }

        .upload-area:hover {
            border-color: var(--primary-color);
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .upload-area.drag-over {
            border-color: var(--primary-color);
            background: rgba(0, 212, 255, 0.1);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.7;
        }

        .upload-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .upload-hint {
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-top: 10px;
            opacity: 0.6;
        }

        #fileInput {
            display: none;
        }

        /* 图片列表样式 */
        .image-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .image-list::-webkit-scrollbar {
            width: 6px;
        }

        .image-list::-webkit-scrollbar-track {
            background: var(--bg-dark);
            border-radius: 3px;
        }

        .image-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .image-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 8px;
            background: var(--bg-hover);
        }

        .image-item:hover {
            background: rgba(0, 212, 255, 0.1);
        }

        .image-item.active {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid var(--primary-color);
        }

        .image-item.processed {
            border-left: 3px solid var(--success-color);
        }

        .image-thumb {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            object-fit: cover;
            background: var(--bg-dark);
        }

        .image-info {
            flex: 1;
            min-width: 0;
        }

        .image-name {
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .image-size {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .image-status {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--bg-dark);
        }

        .image-status.processed {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success-color);
        }

        /* 主工作区样式 */
        .workspace {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            min-height: 600px;
        }

        .workspace-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .workspace-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .workspace-actions {
            display: flex;
            gap: 10px;
        }

        /* 按钮样式 */
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--bg-dark);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: var(--bg-hover);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        /* Canvas容器样式 */
        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            background: var(--bg-dark);
            margin: 20px;
            border-radius: 8px;
            overflow: hidden;
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
        }

        #mainCanvas {
            max-width: 100%;
            max-height: 500px;
            display: block;
            border-radius: 4px;
        }

        /* 选区框样式 */
        .selection-box {
            position: absolute;
            border: 2px dashed var(--primary-color);
            background: rgba(0, 212, 255, 0.1);
            cursor: move;
            display: none;
        }

        .selection-box.active {
            display: block;
        }

        .selection-box::before {
            content: '水印区域';
            position: absolute;
            top: -25px;
            left: 0;
            background: var(--primary-color);
            color: var(--bg-dark);
            padding: 2px 8px;
            font-size: 0.7rem;
            border-radius: 4px;
            white-space: nowrap;
        }

        /* 调整手柄 */
        .resize-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--primary-color);
            border: 2px solid var(--bg-dark);
            border-radius: 50%;
        }

        .resize-handle.nw { top: -6px; left: -6px; cursor: nw-resize; }
        .resize-handle.ne { top: -6px; right: -6px; cursor: ne-resize; }
        .resize-handle.sw { bottom: -6px; left: -6px; cursor: sw-resize; }
        .resize-handle.se { bottom: -6px; right: -6px; cursor: se-resize; }

        /* 空状态提示 */
        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 60px 20px;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* 工具栏样式 */
        .toolbar {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tool-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .tool-input {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .tool-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        /* 统计信息 */
        .stats {
            display: flex;
            gap: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-value {
            color: var(--primary-color);
            font-weight: 600;
        }

        /* 进度条 */
        .progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .progress-container.active {
            display: flex;
        }

        .progress-box {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .progress-bar {
            width: 300px;
            height: 8px;
            background: var(--bg-dark);
            border-radius: 4px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* 响应式布局 */
        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                order: 2;
            }

            .workspace {
                order: 1;
            }
        }

        /* 提示信息 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1001;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: var(--success-color);
        }

        .toast.error {
            border-color: var(--danger-color);
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="app-container">
        <!-- 头部 -->
        <header class="header">
            <h1>批量图片去水印工具</h1>
            <p>支持 JPG、PNG 格式图片的批量去水印处理</p>
        </header>

        <!-- 主布局 -->
        <div class="main-layout">
            <!-- 侧边栏 -->
            <aside class="sidebar">
                <!-- 上传面板 -->
                <div class="panel">
                    <h3 class="panel-title">图片上传</h3>
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-icon">📁</div>
                        <div class="upload-text">点击或拖拽上传图片</div>
                        <div class="upload-hint">支持 JPG、PNG 格式</div>
                    </div>
                    <input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png">
                </div>

                <!-- 图片列表面板 -->
                <div class="panel">
                    <h3 class="panel-title">图片列表</h3>
                    <div class="image-list" id="imageList">
                        <div class="empty-state" style="padding: 20px;">
                            <p>暂无图片</p>
                        </div>
                    </div>
                    <div class="stats" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-color);">
                        <div class="stat-item">
                            共 <span class="stat-value" id="totalCount">0</span> 张
                        </div>
                        <div class="stat-item">
                            已处理 <span class="stat-value" id="processedCount">0</span> 张
                        </div>
                    </div>
                </div>
            </aside>

            <!-- 主工作区 -->
            <main class="workspace">
                <div class="workspace-header">
                    <h2 class="workspace-title">图片编辑区</h2>
                    <div class="workspace-actions">
                        <button class="btn btn-secondary" id="clearAllBtn" disabled>清空全部</button>
                        <button class="btn btn-primary" id="processAllBtn" disabled>批量处理</button>
                    </div>
                </div>

                <div class="canvas-container" id="canvasContainer">
                    <div class="empty-state" id="emptyState">
                        <div class="empty-state-icon">🖼️</div>
                        <p>请上传图片开始编辑</p>
                        <p style="font-size: 0.85rem; margin-top: 10px;">上传后可在图片上拖拽选区框圈选水印位置</p>
                    </div>
                    <div class="canvas-wrapper" id="canvasWrapper" style="display: none;">
                        <canvas id="mainCanvas"></canvas>
                        <div class="selection-box" id="selectionBox">
                            <div class="resize-handle nw" data-handle="nw"></div>
                            <div class="resize-handle ne" data-handle="ne"></div>
                            <div class="resize-handle sw" data-handle="sw"></div>
                            <div class="resize-handle se" data-handle="se"></div>
                        </div>
                    </div>
                </div>

                <div class="toolbar">
                    <div class="tool-group">
                        <span class="tool-label">选区位置:</span>
                        <span id="selectionInfo">未设置</span>
                    </div>
                    <div class="tool-group">
                        <button class="btn btn-secondary" id="resetSelectionBtn" disabled>重置选区</button>
                        <button class="btn btn-primary" id="processCurrentBtn" disabled>处理当前</button>
                        <button class="btn btn-secondary" id="downloadCurrentBtn" disabled>下载当前</button>
                        <button class="btn btn-primary" id="downloadAllBtn" disabled>打包下载 (ZIP)</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 进度弹窗 -->
    <div class="progress-container" id="progressContainer">
        <div class="progress-box">
            <h3>正在处理图片...</h3>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p class="progress-text" id="progressText">0 / 0</p>
        </div>
    </div>

    <!-- 提示信息 -->
    <div class="toast" id="toast"></div>

    <script>
        /* ==================== JavaScript模块 ==================== */

        /**
         * 批量图片去水印工具
         * 采用模块化设计，分离UI操作、图像处理和文件下载逻辑
         */

        /* ==================== 配置常量模块 ==================== */
        const CONFIG = {
            SUPPORTED_FORMATS: ['image/jpeg', 'image/jpg', 'image/png'],
            FILE_EXTENSIONS: ['.jpg', '.jpeg', '.png'],
            MAX_FILE_SIZE: 50 * 1024 * 1024, // 50MB
            DEFAULT_SELECTION_SIZE: 100,
            MIN_SELECTION_SIZE: 20,
            CANVAS_QUALITY: 0.92
        };

        /* ==================== 状态管理模块 ==================== */
        const AppState = {
            images: [],
            currentImageIndex: -1,
            selection: { x: 0, y: 0, width: 0, height: 0 },
            isProcessing: false,
            
            /**
             * 添加图片到列表
             * @param {Object} imageData - 图片数据对象
             */
            addImage(imageData) {
                this.images.push({
                    id: Date.now() + Math.random(),
                    file: imageData.file,
                    name: imageData.name,
                    size: imageData.size,
                    originalUrl: imageData.url,
                    processedUrl: null,
                    processed: false,
                    selection: null
                });
            },

            /**
             * 获取当前选中的图片
             * @returns {Object|null} 当前图片对象
             */
            getCurrentImage() {
                if (this.currentImageIndex < 0 || this.currentImageIndex >= this.images.length) {
                    return null;
                }
                return this.images[this.currentImageIndex];
            },

            /**
             * 更新当前图片的处理结果
             * @param {string} processedUrl - 处理后的图片URL
             * @param {Object} selection - 选区信息
             */
            updateCurrentImage(processedUrl, selection) {
                const image = this.getCurrentImage();
                if (image) {
                    image.processedUrl = processedUrl;
                    image.processed = true;
                    image.selection = { ...selection };
                }
            },

            /**
             * 清空所有图片
             */
            clearAll() {
                this.images.forEach(img => {
                    URL.revokeObjectURL(img.originalUrl);
                    if (img.processedUrl) {
                        URL.revokeObjectURL(img.processedUrl);
                    }
                });
                this.images = [];
                this.currentImageIndex = -1;
                this.selection = { x: 0, y: 0, width: 0, height: 0 };
            },

            /**
             * 获取已处理图片数量
             * @returns {number} 已处理数量
             */
            getProcessedCount() {
                return this.images.filter(img => img.processed).length;
            }
        };

        /* ==================== UI操作模块 ==================== */
        const UIModule = {
            elements: {},

            /**
             * 初始化UI模块
             */
            init() {
                this.cacheElements();
                this.bindEvents();
            },

            /**
             * 缓存DOM元素引用
             */
            cacheElements() {
                this.elements = {
                    uploadArea: document.getElementById('uploadArea'),
                    fileInput: document.getElementById('fileInput'),
                    imageList: document.getElementById('imageList'),
                    canvasContainer: document.getElementById('canvasContainer'),
                    canvasWrapper: document.getElementById('canvasWrapper'),
                    mainCanvas: document.getElementById('mainCanvas'),
                    emptyState: document.getElementById('emptyState'),
                    selectionBox: document.getElementById('selectionBox'),
                    selectionInfo: document.getElementById('selectionInfo'),
                    totalCount: document.getElementById('totalCount'),
                    processedCount: document.getElementById('processedCount'),
                    clearAllBtn: document.getElementById('clearAllBtn'),
                    processAllBtn: document.getElementById('processAllBtn'),
                    processCurrentBtn: document.getElementById('processCurrentBtn'),
                    resetSelectionBtn: document.getElementById('resetSelectionBtn'),
                    downloadCurrentBtn: document.getElementById('downloadCurrentBtn'),
                    downloadAllBtn: document.getElementById('downloadAllBtn'),
                    progressContainer: document.getElementById('progressContainer'),
                    progressFill: document.getElementById('progressFill'),
                    progressText: document.getElementById('progressText'),
                    toast: document.getElementById('toast')
                };
            },

            /**
             * 绑定事件监听器
             */
            bindEvents() {
                const { uploadArea, fileInput } = this.elements;

                // 上传区域点击事件
                uploadArea.addEventListener('click', () => fileInput.click());

                // 文件选择事件
                fileInput.addEventListener('change', (e) => this.handleFileSelect(e.target.files));

                // 拖拽事件
                uploadArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadArea.classList.add('drag-over');
                });

                uploadArea.addEventListener('dragleave', () => {
                    uploadArea.classList.remove('drag-over');
                });

                uploadArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadArea.classList.remove('drag-over');
                    this.handleFileSelect(e.dataTransfer.files);
                });

                // 按钮事件
                this.elements.clearAllBtn.addEventListener('click', () => this.handleClearAll());
                this.elements.processAllBtn.addEventListener('click', () => this.handleProcessAll());
                this.elements.processCurrentBtn.addEventListener('click', () => this.handleProcessCurrent());
                this.elements.resetSelectionBtn.addEventListener('click', () => this.resetSelection());
                this.elements.downloadCurrentBtn.addEventListener('click', () => this.handleDownloadCurrent());
                this.elements.downloadAllBtn.addEventListener('click', () => this.handleDownloadAll());

                // 选区框拖拽事件
                this.initSelectionBoxEvents();
            },

            /**
             * 处理文件选择
             * @param {FileList} files - 文件列表
             */
            handleFileSelect(files) {
                const validFiles = Array.from(files).filter(file => {
                    const isValidType = CONFIG.SUPPORTED_FORMATS.includes(file.type.toLowerCase());
                    const isValidSize = file.size <= CONFIG.MAX_FILE_SIZE;
                    
                    if (!isValidType) {
                        this.showToast(`不支持的文件格式: ${file.name}`, 'error');
                    } else if (!isValidSize) {
                        this.showToast(`文件过大: ${file.name}`, 'error');
                    }
                    
                    return isValidType && isValidSize;
                });

                if (validFiles.length === 0) return;

                validFiles.forEach(file => {
                    const url = URL.createObjectURL(file);
                    AppState.addImage({
                        file: file,
                        name: file.name,
                        size: this.formatFileSize(file.size),
                        url: url
                    });
                });

                this.updateImageList();
                this.updateStats();
                this.updateButtons();

                // 自动选择第一张图片
                if (AppState.images.length === validFiles.length) {
                    this.selectImage(0);
                }

                this.showToast(`成功添加 ${validFiles.length} 张图片`, 'success');
            },

            /**
             * 格式化文件大小
             * @param {number} bytes - 字节数
             * @returns {string} 格式化后的文件大小
             */
            formatFileSize(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            },

            /**
             * 更新图片列表显示
             */
            updateImageList() {
                const { imageList } = this.elements;
                
                if (AppState.images.length === 0) {
                    imageList.innerHTML = `
                        <div class="empty-state" style="padding: 20px;">
                            <p>暂无图片</p>
                        </div>
                    `;
                    return;
                }

                imageList.innerHTML = AppState.images.map((img, index) => `
                    <div class="image-item ${index === AppState.currentImageIndex ? 'active' : ''} ${img.processed ? 'processed' : ''}" 
                         data-index="${index}">
                        <img class="image-thumb" src="${img.originalUrl}" alt="${img.name}">
                        <div class="image-info">
                            <div class="image-name">${img.name}</div>
                            <div class="image-size">${img.size}</div>
                        </div>
                        ${img.processed ? '<span class="image-status processed">已处理</span>' : ''}
                    </div>
                `).join('');

                // 绑定点击事件
                imageList.querySelectorAll('.image-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const index = parseInt(item.dataset.index);
                        this.selectImage(index);
                    });
                });
            },

            /**
             * 选择图片
             * @param {number} index - 图片索引
             */
            selectImage(index) {
                AppState.currentImageIndex = index;
                const image = AppState.getCurrentImage();
                
                if (!image) return;

                this.updateImageList();
                this.loadImageToCanvas(image);
            },

            /**
             * 加载图片到Canvas
             * @param {Object} imageData - 图片数据
             */
            loadImageToCanvas(imageData) {
                const { mainCanvas, emptyState, canvasWrapper, selectionBox } = this.elements;
                const ctx = mainCanvas.getContext('2d');
                const img = new Image();

                img.onload = () => {
                    // 设置canvas尺寸
                    mainCanvas.width = img.width;
                    mainCanvas.height = img.height;

                    // 绘制图片
                    ctx.drawImage(img, 0, 0);

                    // 显示canvas，隐藏空状态
                    emptyState.style.display = 'none';
                    canvasWrapper.style.display = 'inline-block';

                    // 初始化选区
                    this.initSelectionBox(img.width, img.height, imageData.selection);
                };

                img.src = imageData.processedUrl || imageData.originalUrl;
            },

            /**
             * 初始化选区框
             * @param {number} imgWidth - 图片宽度
             * @param {number} imgHeight - 图片高度
             * @param {Object} savedSelection - 保存的选区信息
             */
            initSelectionBox(imgWidth, imgHeight, savedSelection) {
                const { selectionBox } = this.elements;
                
                if (savedSelection) {
                    AppState.selection = { ...savedSelection };
                } else {
                    // 默认选区在中心位置
                    const size = Math.min(CONFIG.DEFAULT_SELECTION_SIZE, imgWidth / 4, imgHeight / 4);
                    AppState.selection = {
                        x: (imgWidth - size) / 2,
                        y: (imgHeight - size) / 2,
                        width: size,
                        height: size
                    };
                }

                this.updateSelectionBoxPosition();
                selectionBox.classList.add('active');
                this.updateSelectionInfo();
                this.elements.resetSelectionBtn.disabled = false;
            },

            /**
             * 初始化选区框拖拽和调整大小事件
             */
            initSelectionBoxEvents() {
                const { selectionBox, mainCanvas } = this.elements;
                let isDragging = false;
                let isResizing = false;
                let resizeHandle = null;
                let startX, startY;
                let startSelection = {};

                // 鼠标按下事件
                selectionBox.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    
                    if (e.target.classList.contains('resize-handle')) {
                        isResizing = true;
                        resizeHandle = e.target.dataset.handle;
                    } else {
                        isDragging = true;
                    }

                    startX = e.clientX;
                    startY = e.clientY;
                    startSelection = { ...AppState.selection };
                });

                // 鼠标移动事件
                document.addEventListener('mousemove', (e) => {
                    if (!isDragging && !isResizing) return;

                    const deltaX = e.clientX - startX;
                    const deltaY = e.clientY - startY;
                    const canvas = mainCanvas;
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;

                    if (isDragging) {
                        // 拖拽移动
                        AppState.selection.x = Math.max(0, Math.min(
                            canvas.width - startSelection.width,
                            startSelection.x + deltaX * scaleX
                        ));
                        AppState.selection.y = Math.max(0, Math.min(
                            canvas.height - startSelection.height,
                            startSelection.y + deltaY * scaleY
                        ));
                    } else if (isResizing) {
                        // 调整大小
                        const dx = deltaX * scaleX;
                        const dy = deltaY * scaleY;

                        switch (resizeHandle) {
                            case 'se':
                                AppState.selection.width = Math.max(CONFIG.MIN_SELECTION_SIZE, 
                                    Math.min(canvas.width - startSelection.x, startSelection.width + dx));
                                AppState.selection.height = Math.max(CONFIG.MIN_SELECTION_SIZE, 
                                    Math.min(canvas.height - startSelection.y, startSelection.height + dy));
                                break;
                            case 'sw':
                                const newWidthSw = Math.max(CONFIG.MIN_SELECTION_SIZE, startSelection.width - dx);
                                const newXSw = Math.max(0, startSelection.x + startSelection.width - newWidthSw);
                                AppState.selection.x = newXSw;
                                AppState.selection.width = Math.min(startSelection.x + startSelection.width, newWidthSw);
                                AppState.selection.height = Math.max(CONFIG.MIN_SELECTION_SIZE, 
                                    Math.min(canvas.height - startSelection.y, startSelection.height + dy));
                                break;
                            case 'ne':
                                AppState.selection.width = Math.max(CONFIG.MIN_SELECTION_SIZE, 
                                    Math.min(canvas.width - startSelection.x, startSelection.width + dx));
                                const newHeightNe = Math.max(CONFIG.MIN_SELECTION_SIZE, startSelection.height - dy);
                                const newYNe = Math.max(0, startSelection.y + startSelection.height - newHeightNe);
                                AppState.selection.y = newYNe;
                                AppState.selection.height = Math.min(startSelection.y + startSelection.height, newHeightNe);
                                break;
                            case 'nw':
                                const newWidthNw = Math.max(CONFIG.MIN_SELECTION_SIZE, startSelection.width - dx);
                                const newXNw = Math.max(0, startSelection.x + startSelection.width - newWidthNw);
                                const newHeightNw = Math.max(CONFIG.MIN_SELECTION_SIZE, startSelection.height - dy);
                                const newYNw = Math.max(0, startSelection.y + startSelection.height - newHeightNw);
                                AppState.selection.x = newXNw;
                                AppState.selection.y = newYNw;
                                AppState.selection.width = Math.min(startSelection.x + startSelection.width, newWidthNw);
                                AppState.selection.height = Math.min(startSelection.y + startSelection.height, newHeightNw);
                                break;
                        }
                    }

                    this.updateSelectionBoxPosition();
                    this.updateSelectionInfo();
                });

                // 鼠标释放事件
                document.addEventListener('mouseup', () => {
                    isDragging = false;
                    isResizing = false;
                    resizeHandle = null;
                });
            },

            /**
             * 更新选区框位置
             */
            updateSelectionBoxPosition() {
                const { selectionBox, mainCanvas } = this.elements;
                const canvas = mainCanvas;
                const rect = canvas.getBoundingClientRect();
                const scaleX = rect.width / canvas.width;
                const scaleY = rect.height / canvas.height;

                const { x, y, width, height } = AppState.selection;

                selectionBox.style.left = (x * scaleX) + 'px';
                selectionBox.style.top = (y * scaleY) + 'px';
                selectionBox.style.width = (width * scaleX) + 'px';
                selectionBox.style.height = (height * scaleY) + 'px';
            },

            /**
             * 更新选区信息显示
             */
            updateSelectionInfo() {
                const { x, y, width, height } = AppState.selection;
                this.elements.selectionInfo.textContent = 
                    `X:${Math.round(x)} Y:${Math.round(y)} W:${Math.round(width)} H:${Math.round(height)}`;
            },

            /**
             * 重置选区
             */
            resetSelection() {
                const image = AppState.getCurrentImage();
                if (image) {
                    const canvas = this.elements.mainCanvas;
                    this.initSelectionBox(canvas.width, canvas.height, null);
                }
            },

            /**
             * 更新统计信息
             */
            updateStats() {
                this.elements.totalCount.textContent = AppState.images.length;
                this.elements.processedCount.textContent = AppState.getProcessedCount();
            },

            /**
             * 更新按钮状态
             */
            updateButtons() {
                const hasImages = AppState.images.length > 0;
                const hasCurrentImage = AppState.getCurrentImage() !== null;
                const hasProcessedImages = AppState.getProcessedCount() > 0;

                this.elements.clearAllBtn.disabled = !hasImages;
                this.elements.processAllBtn.disabled = !hasImages || AppState.isProcessing;
                this.elements.processCurrentBtn.disabled = !hasCurrentImage || AppState.isProcessing;
                this.elements.resetSelectionBtn.disabled = !hasCurrentImage;
                this.elements.downloadCurrentBtn.disabled = !hasCurrentImage;
                this.elements.downloadAllBtn.disabled = !hasProcessedImages;
            },

            /**
             * 显示提示信息
             * @param {string} message - 提示内容
             * @param {string} type - 提示类型 (success/error)
             */
            showToast(message, type = 'success') {
                const { toast } = this.elements;
                toast.textContent = message;
                toast.className = `toast ${type} show`;
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            },

            /**
             * 显示进度条
             * @param {boolean} show - 是否显示
             */
            showProgress(show) {
                this.elements.progressContainer.classList.toggle('active', show);
            },

            /**
             * 更新进度条
             * @param {number} current - 当前进度
             * @param {number} total - 总数
             */
            updateProgress(current, total) {
                const percentage = (current / total) * 100;
                this.elements.progressFill.style.width = percentage + '%';
                this.elements.progressText.textContent = `${current} / ${total}`;
            },

            /**
             * 处理清空全部
             */
            handleClearAll() {
                if (confirm('确定要清空所有图片吗？')) {
                    AppState.clearAll();
                    this.elements.emptyState.style.display = 'block';
                    this.elements.canvasWrapper.style.display = 'none';
                    this.elements.selectionBox.classList.remove('active');
                    this.updateImageList();
                    this.updateStats();
                    this.updateButtons();
                    this.showToast('已清空所有图片', 'success');
                }
            },

            /**
             * 处理批量处理
             */
            async handleProcessAll() {
                if (AppState.isProcessing) return;

                AppState.isProcessing = true;
                this.updateButtons();
                this.showProgress(true);

                const total = AppState.images.length;

                for (let i = 0; i < total; i++) {
                    this.updateProgress(i + 1, total);
                    
                    // 切换到当前图片
                    this.selectImage(i);
                    
                    // 处理图片
                    await ImageModule.processCurrentImage();
                    
                    // 短暂延迟，让UI更新
                    await new Promise(resolve => setTimeout(resolve, 50));
                }

                AppState.isProcessing = false;
                this.showProgress(false);
                this.updateStats();
                this.updateButtons();
                this.updateImageList();
                this.showToast('批量处理完成！', 'success');
            },

            /**
             * 处理当前图片
             */
            async handleProcessCurrent() {
                if (AppState.isProcessing) return;

                const image = AppState.getCurrentImage();
                if (!image) return;

                AppState.isProcessing = true;
                this.updateButtons();

                await ImageModule.processCurrentImage();

                AppState.isProcessing = false;
                this.updateStats();
                this.updateButtons();
                this.updateImageList();
                this.showToast('当前图片处理完成！', 'success');
            },

            /**
             * 处理下载当前图片
             */
            handleDownloadCurrent() {
                const image = AppState.getCurrentImage();
                if (!image) return;

                const url = image.processedUrl || image.originalUrl;
                const name = image.processed ? 
                    image.name.replace(/\.[^/.]+$/, '') + '_processed' + image.name.match(/\.[^/.]+$/)[0] : 
                    image.name;

                DownloadModule.downloadSingleFile(url, name);
                this.showToast('下载已开始', 'success');
            },

            /**
             * 处理打包下载
             */
            async handleDownloadAll() {
                const processedImages = AppState.images.filter(img => img.processed);
                if (processedImages.length === 0) {
                    this.showToast('没有已处理的图片', 'error');
                    return;
                }

                this.showProgress(true);
                this.updateProgress(0, processedImages.length);

                try {
                    await DownloadModule.downloadAsZip(processedImages, (current, total) => {
                        this.updateProgress(current, total);
                    });
                    this.showToast('ZIP打包下载已开始', 'success');
                } catch (error) {
                    this.showToast('下载失败: ' + error.message, 'error');
                } finally {
                    this.showProgress(false);
                }
            }
        };

        /* ==================== 图像处理模块 ==================== */
        const ImageModule = {
            /**
             * 处理当前图片
             * @returns {Promise<void>}
             */
            async processCurrentImage() {
                const image = AppState.getCurrentImage();
                if (!image) return;

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const img = new Image();

                return new Promise((resolve) => {
                    img.onload = () => {
                        canvas.width = img.width;
                        canvas.height = img.height;

                        // 绘制原图
                        ctx.drawImage(img, 0, 0);

                        // 获取选区
                        const { x, y, width, height } = AppState.selection;

                        // 使用图像修复算法去除水印
                        this.removeWatermark(ctx, canvas.width, canvas.height, x, y, width, height);

                        // 生成处理后的图片URL
                        const processedUrl = canvas.toDataURL('image/png', CONFIG.CANVAS_QUALITY);
                        
                        // 更新状态
                        AppState.updateCurrentImage(processedUrl, AppState.selection);

                        // 更新Canvas显示
                        const mainCtx = UIModule.elements.mainCanvas.getContext('2d');
                        mainCtx.drawImage(canvas, 0, 0);

                        resolve();
                    };

                    img.src = image.originalUrl;
                });
            },

            /**
             * 去除水印
             * 使用基于周围像素的插值算法填充水印区域
             * @param {CanvasRenderingContext2D} ctx - Canvas上下文
             * @param {number} canvasWidth - Canvas宽度
             * @param {number} canvasHeight - Canvas高度
             * @param {number} x - 选区X坐标
             * @param {number} y - 选区Y坐标
             * @param {number} width - 选区宽度
             * @param {number} height - 选区高度
             */
            removeWatermark(ctx, canvasWidth, canvasHeight, x, y, width, height) {
                // 确保选区在画布范围内
                x = Math.max(0, Math.min(x, canvasWidth));
                y = Math.max(0, Math.min(y, canvasHeight));
                width = Math.min(width, canvasWidth - x);
                height = Math.min(height, canvasHeight - y);

                if (width <= 0 || height <= 0) return;

                // 获取图像数据
                const imageData = ctx.getImageData(0, 0, canvasWidth, canvasHeight);
                const data = imageData.data;

                // 使用双向插值算法填充水印区域
                for (let py = y; py < y + height; py++) {
                    for (let px = x; px < x + width; px++) {
                        const idx = (py * canvasWidth + px) * 4;
                        
                        // 计算插值权重
                        const weightX = (px - x) / width;
                        const weightY = (py - y) / height;

                        // 获取周围参考点颜色
                        const leftX = Math.max(0, x - 10);
                        const rightX = Math.min(canvasWidth - 1, x + width + 10);
                        const topY = Math.max(0, y - 10);
                        const bottomY = Math.min(canvasHeight - 1, y + height + 10);

                        // 获取四个方向的颜色样本
                        const leftIdx = (py * canvasWidth + leftX) * 4;
                        const rightIdx = (py * canvasWidth + rightX) * 4;
                        const topIdx = (topY * canvasWidth + px) * 4;
                        const bottomIdx = (bottomY * canvasWidth + px) * 4;

                        // 双向插值计算
                        const r = this.interpolateColor(
                            data[leftIdx], data[rightIdx], data[topIdx], data[bottomIdx],
                            weightX, weightY
                        );
                        const g = this.interpolateColor(
                            data[leftIdx + 1], data[rightIdx + 1], data[topIdx + 1], data[bottomIdx + 1],
                            weightX, weightY
                        );
                        const b = this.interpolateColor(
                            data[leftIdx + 2], data[rightIdx + 2], data[topIdx + 2], data[bottomIdx + 2],
                            weightX, weightY
                        );

                        // 添加轻微噪声使过渡更自然
                        const noise = (Math.random() - 0.5) * 8;

                        data[idx] = Math.max(0, Math.min(255, r + noise));
                        data[idx + 1] = Math.max(0, Math.min(255, g + noise));
                        data[idx + 2] = Math.max(0, Math.min(255, b + noise));
                        // Alpha通道保持不变
                    }
                }

                // 应用高斯模糊使边缘更平滑
                this.applyGaussianBlur(data, canvasWidth, canvasHeight, x, y, width, height, 2);

                // 将处理后的数据写回Canvas
                ctx.putImageData(imageData, 0, 0);
            },

            /**
             * 颜色插值计算
             * @param {number} left - 左侧颜色值
             * @param {number} right - 右侧颜色值
             * @param {number} top - 顶部颜色值
             * @param {number} bottom - 底部颜色值
             * @param {number} weightX - X方向权重
             * @param {number} weightY - Y方向权重
             * @returns {number} 插值后的颜色值
             */
            interpolateColor(left, right, top, bottom, weightX, weightY) {
                // 水平插值
                const horizontal = left * (1 - weightX) + right * weightX;
                // 垂直插值
                const vertical = top * (1 - weightY) + bottom * weightY;
                // 综合权重
                return horizontal * 0.5 + vertical * 0.5;
            },

            /**
             * 应用高斯模糊
             * @param {Uint8ClampedArray} data - 图像数据
             * @param {number} width - 图像宽度
             * @param {number} height - 图像高度
             * @param {number} x - 区域X坐标
             * @param {number} y - 区域Y坐标
             * @param {number} regionWidth - 区域宽度
             * @param {number} regionHeight - 区域高度
             * @param {number} radius - 模糊半径
             */
            applyGaussianBlur(data, width, height, x, y, regionWidth, regionHeight, radius) {
                // 创建临时缓冲区
                const tempData = new Uint8ClampedArray(data);

                // 高斯核（3x3简化版）
                const kernel = [
                    1/16, 2/16, 1/16,
                    2/16, 4/16, 2/16,
                    1/16, 2/16, 1/16
                ];

                // 扩展处理区域以包含边缘
                const startX = Math.max(1, x);
                const startY = Math.max(1, y);
                const endX = Math.min(width - 1, x + regionWidth);
                const endY = Math.min(height - 1, y + regionHeight);

                for (let py = startY; py < endY; py++) {
                    for (let px = startX; px < endX; px++) {
                        let r = 0, g = 0, b = 0;

                        // 应用卷积核
                        for (let ky = -1; ky <= 1; ky++) {
                            for (let kx = -1; kx <= 1; kx++) {
                                const sampleX = Math.max(0, Math.min(width - 1, px + kx));
                                const sampleY = Math.max(0, Math.min(height - 1, py + ky));
                                const sampleIdx = (sampleY * width + sampleX) * 4;
                                const kernelIdx = (ky + 1) * 3 + (kx + 1);
                                const weight = kernel[kernelIdx];

                                r += tempData[sampleIdx] * weight;
                                g += tempData[sampleIdx + 1] * weight;
                                b += tempData[sampleIdx + 2] * weight;
                            }
                        }

                        const idx = (py * width + px) * 4;
                        data[idx] = r;
                        data[idx + 1] = g;
                        data[idx + 2] = b;
                    }
                }
            }
        };

        /* ==================== 文件下载模块 ==================== */
        const DownloadModule = {
            /**
             * 下载单个文件
             * @param {string} url - 文件URL
             * @param {string} filename - 文件名
             */
            downloadSingleFile(url, filename) {
                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            },

            /**
             * 将DataURL转换为Blob
             * @param {string} dataUrl - DataURL字符串
             * @returns {Blob} Blob对象
             */
            dataUrlToBlob(dataUrl) {
                const arr = dataUrl.split(',');
                const mime = arr[0].match(/:(.*?);/)[1];
                const bstr = atob(arr[1]);
                let n = bstr.length;
                const u8arr = new Uint8Array(n);
                
                while (n--) {
                    u8arr[n] = bstr.charCodeAt(n);
                }
                
                return new Blob([u8arr], { type: mime });
            },

            /**
             * 打包下载为ZIP
             * @param {Array} images - 图片数组
             * @param {Function} onProgress - 进度回调函数
             * @returns {Promise<void>}
             */
            async downloadAsZip(images, onProgress) {
                const zip = new JSZip();
                const folder = zip.folder('processed_images');

                for (let i = 0; i < images.length; i++) {
                    const image = images[i];
                    const url = image.processedUrl || image.originalUrl;
                    
                    // 获取文件扩展名
                    const ext = image.name.match(/\.[^/.]+$/)?.[0] || '.png';
                    const filename = `image_${String(i + 1).padStart(3, '0')}${ext}`;

                    if (url.startsWith('data:')) {
                        // DataURL直接转换为Blob
                        const blob = this.dataUrlToBlob(url);
                        folder.file(filename, blob);
                    } else {
                        // Blob URL需要获取数据
                        const response = await fetch(url);
                        const blob = await response.blob();
                        folder.file(filename, blob);
                    }

                    if (onProgress) {
                        onProgress(i + 1, images.length);
                    }
                }

                // 生成ZIP文件
                const zipBlob = await zip.generateAsync({ type: 'blob' });
                const zipUrl = URL.createObjectURL(zipBlob);
                
                // 下载ZIP文件
                this.downloadSingleFile(zipUrl, `processed_images_${Date.now()}.zip`);
                
                // 清理URL对象
                URL.revokeObjectURL(zipUrl);
            }
        };

        /* ==================== 应用初始化 ==================== */
