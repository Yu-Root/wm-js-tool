<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量图片去水印工具</title>
    <style>
        /* ==================== UI模块 - 样式定义 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
        }

        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        header p {
            color: #888;
            font-size: 1rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .sidebar {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .upload-area {
            border: 2px dashed rgba(0, 212, 255, 0.5);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }

        .upload-area.dragover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.2);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #aaa;
            font-size: 14px;
        }

        .upload-text span {
            color: #00d4ff;
            font-weight: bold;
        }

        #fileInput {
            display: none;
        }

        .image-list {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .image-list::-webkit-scrollbar {
            width: 6px;
        }

        .image-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .image-list::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.5);
            border-radius: 3px;
        }

        .image-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .image-item:hover {
            background: rgba(0, 212, 255, 0.1);
        }

        .image-item.active {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid #00d4ff;
        }

        .image-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
            margin-right: 10px;
        }

        .image-item .info {
            flex: 1;
            overflow: hidden;
        }

        .image-item .name {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .image-item .size {
            font-size: 11px;
            color: #888;
        }

        .image-item .delete-btn {
            background: rgba(255, 82, 82, 0.3);
            border: none;
            color: #ff5252;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .image-item .delete-btn:hover {
            background: rgba(255, 82, 82, 0.5);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .canvas-area {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .canvas-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .canvas-title {
            font-size: 18px;
            font-weight: 500;
        }

        .canvas-info {
            color: #888;
            font-size: 13px;
        }

        .canvas-wrapper {
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 500px;
        }

        .canvas-wrapper.empty {
            color: #666;
            font-size: 16px;
        }

        #mainCanvas {
            max-width: 100%;
            max-height: 600px;
            cursor: crosshair;
        }

        .selection-box {
            position: absolute;
            border: 2px solid #00d4ff;
            background: rgba(0, 212, 255, 0.2);
            pointer-events: none;
            display: none;
        }

        .selection-box .resize-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #00d4ff;
            border-radius: 50%;
            pointer-events: auto;
        }

        .selection-box .resize-handle.nw { top: -6px; left: -6px; cursor: nw-resize; }
        .selection-box .resize-handle.ne { top: -6px; right: -6px; cursor: ne-resize; }
        .selection-box .resize-handle.sw { bottom: -6px; left: -6px; cursor: sw-resize; }
        .selection-box .resize-handle.se { bottom: -6px; right: -6px; cursor: se-resize; }

        .selection-box .move-handle {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            cursor: move;
            pointer-events: auto;
        }

        .tools-bar {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .tool-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tool-item label {
            font-size: 13px;
            color: #aaa;
        }

        .tool-item input[type="range"] {
            width: 100px;
            accent-color: #00d4ff;
        }

        .tool-item input[type="number"] {
            width: 60px;
            padding: 5px 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 13px;
        }

        .status-bar {
            margin-top: 15px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 13px;
            color: #888;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state p {
            color: #666;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                order: 1;
            }
            
            .canvas-area {
                order: 2;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>批量图片去水印工具</h1>
            <p>支持批量导入、智能选区、一键去除水印</p>
        </header>

        <div class="main-content">
            <div class="sidebar">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">
                        拖拽图片到此处<br>
                        或 <span>点击选择文件</span>
                    </div>
                    <input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png">
                </div>

                <div class="image-list" id="imageList">
                    <div class="empty-state">
                        <p>暂无图片</p>
                    </div>
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary" id="downloadAllBtn" disabled>
                        📦 打包下载全部 (ZIP)
                    </button>
                    <button class="btn btn-secondary" id="downloadCurrentBtn" disabled>
                        💾 下载当前图片
                    </button>
                    <button class="btn btn-secondary" id="clearAllBtn" disabled>
                        🗑️ 清空全部
                    </button>
                </div>
            </div>

            <div class="canvas-area">
                <div class="canvas-header">
                    <div class="canvas-title">编辑区域</div>
                    <div class="canvas-info" id="canvasInfo">请先导入图片</div>
                </div>

                <div class="canvas-wrapper" id="canvasWrapper">
                    <div class="empty-state" id="emptyState">
                        <div class="icon">🖼️</div>
                        <p>请在左侧导入图片开始编辑</p>
                    </div>
                    <canvas id="mainCanvas" style="display: none;"></canvas>
                    <div class="selection-box" id="selectionBox">
                        <div class="move-handle" id="moveHandle"></div>
                        <div class="resize-handle nw" data-handle="nw"></div>
                        <div class="resize-handle ne" data-handle="ne"></div>
                        <div class="resize-handle sw" data-handle="sw"></div>
                        <div class="resize-handle se" data-handle="se"></div>
                    </div>
                </div>

                <div class="tools-bar">
                    <div class="tool-item">
                        <label>选区X:</label>
                        <input type="number" id="selectionX" value="0" min="0">
                    </div>
                    <div class="tool-item">
                        <label>选区Y:</label>
                        <input type="number" id="selectionY" value="0" min="0">
                    </div>
                    <div class="tool-item">
                        <label>宽度:</label>
                        <input type="number" id="selectionW" value="100" min="10">
                    </div>
                    <div class="tool-item">
                        <label>高度:</label>
                        <input type="number" id="selectionH" value="50" min="10">
                    </div>
                    <button class="btn btn-secondary" id="applyWatermarkBtn" style="padding: 8px 16px;">
                        ✨ 应用水印去除
                    </button>
                </div>

                <div class="status-bar" id="statusBar">
                    就绪 | 支持格式: JPG, PNG
                </div>
            </div>
        </div>
    </div>

    <script src="jszip.min.js"></script>
    <script>
        /* ==================== UI模块 - 界面操作 ==================== */
        const UIModule = {
            elements: {},
            
            /**
             * 初始化UI模块，缓存DOM元素引用
             */
            init: function() {
                this.elements = {
                    uploadArea: document.getElementById('uploadArea'),
                    fileInput: document.getElementById('fileInput'),
                    imageList: document.getElementById('imageList'),
                    mainCanvas: document.getElementById('mainCanvas'),
                    canvasWrapper: document.getElementById('canvasWrapper'),
                    emptyState: document.getElementById('emptyState'),
                    selectionBox: document.getElementById('selectionBox'),
                    canvasInfo: document.getElementById('canvasInfo'),
                    statusBar: document.getElementById('statusBar'),
                    downloadAllBtn: document.getElementById('downloadAllBtn'),
                    downloadCurrentBtn: document.getElementById('downloadCurrentBtn'),
                    clearAllBtn: document.getElementById('clearAllBtn'),
                    selectionX: document.getElementById('selectionX'),
                    selectionY: document.getElementById('selectionY'),
                    selectionW: document.getElementById('selectionW'),
                    selectionH: document.getElementById('selectionH'),
                    applyWatermarkBtn: document.getElementById('applyWatermarkBtn')
                };
                
                this.bindEvents();
            },
            
            /**
             * 绑定UI事件监听器
             */
            bindEvents: function() {
                const self = this;
                
                this.elements.uploadArea.addEventListener('click', function() {
                    self.elements.fileInput.click();
                });
                
                this.elements.fileInput.addEventListener('change', function(e) {
                    ImageModule.handleFiles(e.target.files);
                    e.target.value = '';
                });
                
                this.elements.uploadArea.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    this.classList.add('dragover');
                });
                
                this.elements.uploadArea.addEventListener('dragleave', function(e) {
                    e.preventDefault();
                    this.classList.remove('dragover');
                });
                
                this.elements.uploadArea.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.classList.remove('dragover');
                    ImageModule.handleFiles(e.dataTransfer.files);
                });
                
                this.elements.downloadAllBtn.addEventListener('click', function() {
                    DownloadModule.downloadAllAsZip();
                });
                
                this.elements.downloadCurrentBtn.addEventListener('click', function() {
                    DownloadModule.downloadCurrent();
                });
                
                this.elements.clearAllBtn.addEventListener('click', function() {
                    ImageModule.clearAll();
                });
                
                this.elements.applyWatermarkBtn.addEventListener('click', function() {
                    ImageModule.applyWatermarkRemoval();
                });
                
                this.bindSelectionInputs();
            },
            
            /**
             * 绑定选区输入框事件
             */
            bindSelectionInputs: function() {
                const self = this;
                const inputs = [this.elements.selectionX, this.elements.selectionY, 
                               this.elements.selectionW, this.elements.selectionH];
                
                inputs.forEach(function(input) {
                    input.addEventListener('change', function() {
                        ImageModule.updateSelectionFromInputs();
                    });
                });
            },
            
            /**
             * 更新状态栏信息
             * @param {string} message - 状态消息
             */
            updateStatus: function(message) {
                this.elements.statusBar.textContent = message;
            },
            
            /**
             * 更新画布信息显示
             * @param {string} info - 画布信息
             */
            updateCanvasInfo: function(info) {
                this.elements.canvasInfo.textContent = info;
            },
            
            /**
             * 更新按钮状态
             * @param {boolean} hasImages - 是否有图片
             */
            updateButtonStates: function(hasImages, hasCurrent) {
                this.elements.downloadAllBtn.disabled = !hasImages;
                this.elements.downloadCurrentBtn.disabled = !hasCurrent;
                this.elements.clearAllBtn.disabled = !hasImages;
            },
            
            /**
             * 更新选区输入框的值
             * @param {Object} rect - 选区矩形 {x, y, width, height}
             */
            updateSelectionInputs: function(rect) {
                this.elements.selectionX.value = Math.round(rect.x);
                this.elements.selectionY.value = Math.round(rect.y);
                this.elements.selectionW.value = Math.round(rect.width);
                this.elements.selectionH.value = Math.round(rect.height);
            },
            
            /**
             * 获取选区输入框的值
             * @returns {Object} 选区矩形 {x, y, width, height}
             */
            getSelectionInputs: function() {
                return {
                    x: parseInt(this.elements.selectionX.value) || 0,
                    y: parseInt(this.elements.selectionY.value) || 0,
                    width: parseInt(this.elements.selectionW.value) || 100,
                    height: parseInt(this.elements.selectionH.value) || 50
                };
            }
        };

        /* ==================== 图像处理模块 ==================== */
        const ImageModule = {
            images: [],
            currentIndex: -1,
            canvas: null,
            ctx: null,
            selection: { x: 50, y: 50, width: 100, height: 50 },
            isDragging: false,
            isResizing: false,
            resizeHandle: null,
            dragStart: { x: 0, y: 0 },
            scale: 1,
            offsetX: 0,
            offsetY: 0,
            
            /**
             * 初始化图像处理模块
             */
            init: function() {
                this.canvas = UIModule.elements.mainCanvas;
                this.ctx = this.canvas.getContext('2d');
                this.bindCanvasEvents();
            },
            
            /**
             * 绑定画布事件
             */
            bindCanvasEvents: function() {
                const self = this;
                const selectionBox = UIModule.elements.selectionBox;
                const canvasWrapper = UIModule.elements.canvasWrapper;
                
                selectionBox.addEventListener('mousedown', function(e) {
                    if (e.target.classList.contains('resize-handle')) {
                        self.isResizing = true;
                        self.resizeHandle = e.target.dataset.handle;
                    } else {
                        self.isDragging = true;
                    }
                    self.dragStart = { x: e.clientX, y: e.clientY };
                    e.preventDefault();
                });
                
                document.addEventListener('mousemove', function(e) {
                    if (self.currentIndex < 0) return;
                    
                    if (self.isDragging) {
                        const dx = e.clientX - self.dragStart.x;
                        const dy = e.clientY - self.dragStart.y;
                        self.selection.x += dx;
                        self.selection.y += dy;
                        self.dragStart = { x: e.clientX, y: e.clientY };
                        self.constrainSelection();
                        self.updateSelectionBox();
                    } else if (self.isResizing) {
                        const dx = e.clientX - self.dragStart.x;
                        const dy = e.clientY - self.dragStart.y;
                        self.handleResize(dx, dy);
                        self.dragStart = { x: e.clientX, y: e.clientY };
                        self.updateSelectionBox();
                    }
                });
                
                document.addEventListener('mouseup', function() {
                    self.isDragging = false;
                    self.isResizing = false;
                    self.resizeHandle = null;
                });
                
                canvasWrapper.addEventListener('mousedown', function(e) {
                    if (e.target === self.canvas) {
                        const rect = self.canvas.getBoundingClientRect();
                        const x = (e.clientX - rect.left) / self.scale;
                        const y = (e.clientY - rect.top) / self.scale;
                        self.selection.x = x;
                        self.selection.y = y;
                        self.selection.width = 0;
                        self.selection.height = 0;
                        self.isResizing = true;
                        self.resizeHandle = 'se';
                        self.dragStart = { x: e.clientX, y: e.clientY };
                    }
                });
            },
            
            /**
             * 处理选区缩放
             * @param {number} dx - X方向偏移
             * @param {number} dy - Y方向偏移
             */
            handleResize: function(dx, dy) {
                const handle = this.resizeHandle;
                
                if (handle.includes('e')) {
                    this.selection.width = Math.max(10, this.selection.width + dx / this.scale);
                }
                if (handle.includes('w')) {
                    const newWidth = this.selection.width - dx / this.scale;
                    if (newWidth >= 10) {
                        this.selection.x += dx / this.scale;
                        this.selection.width = newWidth;
                    }
                }
                if (handle.includes('s')) {
                    this.selection.height = Math.max(10, this.selection.height + dy / this.scale);
                }
                if (handle.includes('n')) {
                    const newHeight = this.selection.height - dy / this.scale;
                    if (newHeight >= 10) {
                        this.selection.y += dy / this.scale;
                        this.selection.height = newHeight;
                    }
                }
                
                this.constrainSelection();
            },
            
            /**
             * 限制选区在画布范围内
             */
            constrainSelection: function() {
                const img = this.images[this.currentIndex];
                if (!img) return;
                
                this.selection.x = Math.max(0, Math.min(this.selection.x, img.width - this.selection.width));
                this.selection.y = Math.max(0, Math.min(this.selection.y, img.height - this.selection.height));
            },
            
            /**
             * 检查图片是否已存在
             * @param {File} file - 文件对象
             * @returns {boolean} 是否已存在
             */
            isImageExists: function(file) {
                return this.images.some(function(item) {
                    return item.file.name === file.name && 
                           item.file.size === file.size && 
                           item.file.lastModified === file.lastModified;
                });
            },
            
            /**
             * 处理文件上传
             * @param {FileList} files - 文件列表
             */
            handleFiles: function(files) {
                const self = this;
                const validFiles = Array.from(files).filter(function(file) {
                    return (file.type === 'image/jpeg' || file.type === 'image/png') && 
                           !self.isImageExists(file);
                });
                
                if (validFiles.length === 0) {
                    const totalFiles = Array.from(files).length;
                    if (totalFiles > 0) {
                        UIModule.updateStatus('所选图片已存在或格式不支持');
                    }
                    return;
                }
                
                let loadedCount = 0;
                
                validFiles.forEach(function(file) {
                    const reader = new FileReader();
                    
                    reader.onload = function(e) {
                        const img = new Image();
                        img.onload = function() {
                            self.images.push({
                                file: file,
                                img: img,
                                width: img.width,
                                height: img.height,
                                name: file.name,
                                processed: false
                            });
                            
                            loadedCount++;
                            
                            if (loadedCount === validFiles.length) {
                                self.renderImageList();
                                if (self.currentIndex < 0) {
                                    self.selectImage(0);
                                }
                                UIModule.updateStatus('已加载 ' + self.images.length + ' 张图片');
                                UIModule.updateButtonStates(self.images.length > 0, self.currentIndex >= 0);
                            }
                        };
                        img.src = e.target.result;
                    };
                    
                    reader.readAsDataURL(file);
                });
            },
            
            /**
             * 渲染图片列表
             */
            renderImageList: function() {
                const self = this;
                const listEl = UIModule.elements.imageList;
                
                if (this.images.length === 0) {
                    listEl.innerHTML = '<div class="empty-state"><p>暂无图片</p></div>';
                    return;
                }
                
                listEl.innerHTML = this.images.map(function(item, index) {
                    return '<div class="image-item ' + (index === self.currentIndex ? 'active' : '') + '" data-index="' + index + '">' +
                        '<img src="' + item.img.src + '" alt="">' +
                        '<div class="info">' +
                        '<div class="name">' + item.name + '</div>' +
                        '<div class="size">' + item.width + ' x ' + item.height + '</div>' +
                        '</div>' +
                        '<button class="delete-btn" data-index="' + index + '">×</button>' +
                        '</div>';
                }).join('');
                
                listEl.querySelectorAll('.image-item').forEach(function(item) {
                    item.addEventListener('click', function(e) {
                        if (!e.target.classList.contains('delete-btn')) {
                            self.selectImage(parseInt(this.dataset.index));
                        }
                    });
                });
                
                listEl.querySelectorAll('.delete-btn').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        self.removeImage(parseInt(this.dataset.index));
                    });
                });
            },
            
            /**
             * 选择图片
             * @param {number} index - 图片索引
             */
            selectImage: function(index) {
                if (index < 0 || index >= this.images.length) return;
                
                this.currentIndex = index;
                const img = this.images[index];
                
                this.canvas.width = img.width;
                this.canvas.height = img.height;
                
                const maxWidth = UIModule.elements.canvasWrapper.clientWidth - 40;
                const maxHeight = 600;
                
                this.scale = Math.min(1, maxWidth / img.width, maxHeight / img.height);
                
                this.canvas.style.width = (img.width * this.scale) + 'px';
                this.canvas.style.height = (img.height * this.scale) + 'px';
                
                this.offsetX = (maxWidth - img.width * this.scale) / 2;
                this.offsetY = 0;
                
                this.ctx.drawImage(img.img, 0, 0);
                
                this.selection = { x: 50, y: 50, width: 100, height: 50 };
                
                UIModule.elements.emptyState.style.display = 'none';
                this.canvas.style.display = 'block';
                
                this.updateSelectionBox();
                this.renderImageList();
                UIModule.updateCanvasInfo(img.name + ' | ' + img.width + ' x ' + img.height);
                UIModule.updateButtonStates(this.images.length > 0, true);
            },
            
            /**
             * 更新选区框位置和大小
             */
            updateSelectionBox: function() {
                const box = UIModule.elements.selectionBox;
                const canvasRect = this.canvas.getBoundingClientRect();
                const wrapperRect = UIModule.elements.canvasWrapper.getBoundingClientRect();
                
                box.style.display = 'block';
                box.style.left = (canvasRect.left - wrapperRect.left + this.selection.x * this.scale) + 'px';
                box.style.top = (canvasRect.top - wrapperRect.top + this.selection.y * this.scale) + 'px';
                box.style.width = (this.selection.width * this.scale) + 'px';
                box.style.height = (this.selection.height * this.scale) + 'px';
                
                UIModule.updateSelectionInputs(this.selection);
            },
            
            /**
             * 从输入框更新选区
             */
            updateSelectionFromInputs: function() {
                const rect = UIModule.getSelectionInputs();
                this.selection.x = rect.x;
                this.selection.y = rect.y;
                this.selection.width = rect.width;
                this.selection.height = rect.height;
                this.constrainSelection();
                this.updateSelectionBox();
            },
            
            /**
             * 移除图片
             * @param {number} index - 图片索引
             */
            removeImage: function(index) {
                this.images.splice(index, 1);
                
                if (this.currentIndex >= this.images.length) {
                    this.currentIndex = this.images.length - 1;
                }
                
                if (this.images.length === 0) {
                    this.currentIndex = -1;
                    this.canvas.style.display = 'none';
                    UIModule.elements.emptyState.style.display = 'block';
                    UIModule.elements.selectionBox.style.display = 'none';
                    UIModule.updateCanvasInfo('请先导入图片');
                } else {
                    this.selectImage(this.currentIndex);
                }
                
                this.renderImageList();
                UIModule.updateButtonStates(this.images.length > 0, this.currentIndex >= 0);
                UIModule.updateStatus('已移除图片，剩余 ' + this.images.length + ' 张');
            },
            
            /**
             * 清空所有图片
             */
            clearAll: function() {
                this.images = [];
                this.currentIndex = -1;
                this.canvas.style.display = 'none';
                UIModule.elements.emptyState.style.display = 'block';
                UIModule.elements.selectionBox.style.display = 'none';
                UIModule.updateCanvasInfo('请先导入图片');
                this.renderImageList();
                UIModule.updateButtonStates(false, false);
                UIModule.updateStatus('已清空所有图片');
            },
            
            /**
             * 应用水印去除（使用周围像素填充）
             */
            applyWatermarkRemoval: function() {
                if (this.currentIndex < 0) return;
                
                const img = this.images[this.currentIndex];
                const x = Math.floor(this.selection.x);
                const y = Math.floor(this.selection.y);
                const w = Math.floor(this.selection.width);
                const h = Math.floor(this.selection.height);
                
                if (w < 2 || h < 2) {
                    UIModule.updateStatus('选区太小，请调整选区大小');
                    return;
                }
                
                this.ctx.drawImage(img.img, 0, 0);
                
                const imageData = this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);
                const data = imageData.data;
                
                for (let j = y; j < y + h && j < this.canvas.height; j++) {
                    for (let i = x; i < x + w && i < this.canvas.width; i++) {
                        const sourceX = i < x + w / 2 ? x - 1 : x + w;
                        const sourcePixel = this.getPixelColor(data, sourceX, j, this.canvas.width);
                        
                        if (sourcePixel) {
                            const idx = (j * this.canvas.width + i) * 4;
                            data[idx] = sourcePixel.r;
                            data[idx + 1] = sourcePixel.g;
                            data[idx + 2] = sourcePixel.b;
                            data[idx + 3] = 255;
                        }
                    }
                }
                
                this.ctx.putImageData(imageData, 0, 0);
                
                img.processed = true;
                img.img.src = this.canvas.toDataURL('image/png');
                
                UIModule.updateStatus('已应用水印去除到: ' + img.name);
            },
            
            /**
             * 获取指定位置的像素颜色
             * @param {Uint8ClampedArray} data - 图像数据
             * @param {number} x - X坐标
             * @param {number} y - Y坐标
             * @param {number} width - 图像宽度
             * @returns {Object|null} 像素颜色 {r, g, b}
             */
            getPixelColor: function(data, x, y, width) {
                if (x < 0 || x >= width || y < 0) return null;
                const idx = (y * width + x) * 4;
                return {
                    r: data[idx],
                    g: data[idx + 1],
                    b: data[idx + 2]
                };
            },
            
            /**
             * 获取当前图片的Blob数据
             * @returns {Promise<Blob>} Blob数据
             */
            getCurrentBlob: function() {
                return new Promise(function(resolve) {
                    UIModule.elements.mainCanvas.toBlob(function(blob) {
                        resolve(blob);
                    }, 'image/png');
                });
            }
        };

        /* ==================== 文件下载模块 ==================== */
        const DownloadModule = {
            /**
             * 下载当前图片
             */
            downloadCurrent: function() {
                if (ImageModule.currentIndex < 0) return;
                
                const img = ImageModule.images[ImageModule.currentIndex];
                const link = document.createElement('a');
                link.download = 'processed_' + img.name;
                link.href = ImageModule.canvas.toDataURL('image/png');
                link.click();
                
                UIModule.updateStatus('已下载: ' + img.name);
            },
            
            /**
             * 打包下载所有图片为ZIP
             */
            downloadAllAsZip: async function() {
                if (ImageModule.images.length === 0) return;
                
                UIModule.updateStatus('正在打包图片...');
                
                const zip = new JSZip();
                const self = this;
                
                for (let i = 0; i < ImageModule.images.length; i++) {
                    const img = ImageModule.images[i];
                    
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = img.width;
                    tempCanvas.height = img.height;
                    const tempCtx = tempCanvas.getContext('2d');
                    tempCtx.drawImage(img.img, 0, 0);
                    
                    const blob = await new Promise(function(resolve) {
                        tempCanvas.toBlob(resolve, 'image/png');
                    });
                    
                    const fileName = 'processed_' + img.name.replace(/\.[^.]+$/, '.png');
                    zip.file(fileName, blob);
                }
                
                const content = await zip.generateAsync({ type: 'blob' });
                
                const link = document.createElement('a');
                link.download = 'watermark_removed_images.zip';
                link.href = URL.createObjectURL(content);
                link.click();
                
                URL.revokeObjectURL(link.href);
                UIModule.updateStatus('已打包下载 ' + ImageModule.images.length + ' 张图片');
            }
        };

        /* ==================== 初始化应用 ==================== */
        document.addEventListener('DOMContentLoaded', function() {
            UIModule.init();
            ImageModule.init();
        });
    </script>
</body>
</html>
